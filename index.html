<!DOCTYPE html>
<html lang="ko" data-lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banvier — 서울 호텔 연회장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=3mliteco35"></script>

<!--
  ══════════════════════════════════════════════════════════════
  🗺  네이버 지도 API (Dynamic Map) 실제 연동 방법
  ══════════════════════════════════════════════════════════════

  ✅ 클라이언트 ID가 있다면 아래 3단계만 따라하면 됩니다.

  ─────────────────────────────────────────────────
  STEP 1. 도메인 등록 (네이버 클라우드 플랫폼 콘솔)
  ─────────────────────────────────────────────────
  https://console.ncloud.com 접속
  → Services > Application Services > Maps
  → 해당 Application 클릭 > "수정"
  → "서비스 환경 등록 > Web 서비스 URL" 에
    본인 사이트 URL 추가 (예: https://banvier.kr)
  → 로컬 테스트 시: http://localhost / http://127.0.0.1 추가

  ⚠️ 도메인 미등록 시 429 오류 발생 (인증 실패)

  ─────────────────────────────────────────────────
  STEP 2. 스크립트 로드 (</head> 바로 위에 추가)
  ─────────────────────────────────────────────────
  클라이언트 ID를 아래 YOUR_CLIENT_ID 자리에 넣으세요:

  <script type="text/javascript"
    src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=YOUR_CLIENT_ID">
  </script>

  ─────────────────────────────────────────────────
  STEP 3. 지도 초기화 코드 (기존 map-cv div 제거 후 대체)
  ─────────────────────────────────────────────────
  HTML: <div id="naverMap" style="width:100%;height:100%"></div>

  JS:
  const map = new naver.maps.Map('naverMap', {
    center: new naver.maps.LatLng(37.5665, 126.9780), // 서울 중심
    zoom: 12,
    mapTypeId: naver.maps.MapTypeId.NORMAL,
  });

  // 각 호텔 좌표로 마커 생성 예시:
  const COORDS = {
    1: [37.5140, 127.0590], // 그랜드 인터컨티넨탈 파르나스
    2: [37.5650, 126.9820], // 롯데호텔 서울
    3: [37.5215, 126.9240], // 콘래드 서울
    // ... 나머지 호텔 좌표
  };

  H.forEach(h => {
    const [lat, lng] = COORDS[h.id];
    const marker = new naver.maps.Marker({
      position: new naver.maps.LatLng(lat, lng),
      map: map,
      title: h.name,
    });
    marker.addListener('click', () => openDetail(h.id));
  });

  ─────────────────────────────────────────────────
  📌 무료 사용량: 월 10,000,000건 (과금 없음)
  📌 JavaScript용은 Client ID 값만 있으면 충분
     (Client Secret은 REST API 호출 시만 필요)
  ══════════════════════════════════════════════════════════════

  🔐 소셜 로그인 API 키 발급 방법
  ══════════════════════════════════════════════════════════════

  ── 카카오 로그인 ─────────────────────────────────────────────
  1. https://developers.kakao.com 접속 → 카카오 계정으로 로그인
  2. 우측 상단 "내 애플리케이션" → "애플리케이션 추가하기"
  3. 앱 이름(Banvier), 회사명 입력 → 저장
  4. 앱 설정 > 요약 정보 > "JavaScript 키" 복사 (웹용)
  5. 앱 설정 > 플랫폼 > Web > 사이트 도메인 등록
     (예: https://banvier.kr, http://localhost:3000)
  6. 제품 설정 > 카카오 로그인 > 활성화 ON
  7. 제품 설정 > 카카오 로그인 > Redirect URI 등록
     (예: https://banvier.kr/auth/kakao/callback)
  8. 동의항목 > 닉네임·프로필사진·이메일 "필수" 설정

  연동 코드:
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
    crossorigin="anonymous"></script>
  Kakao.init('YOUR_JAVASCRIPT_KEY');
  Kakao.Auth.authorize({ redirectUri: 'YOUR_REDIRECT_URI' });

  ── 네이버 로그인 ─────────────────────────────────────────────
  1. https://developers.naver.com 접속 → 로그인
  2. 내 애플리케이션 > 애플리케이션 등록
  3. API 선택에서 "네이버 로그인" 체크
  4. 로그인 오픈 API 서비스 환경 > PC 웹 선택
     → 서비스 URL, Callback URL 입력
  5. 등록 완료 후 "Client ID"와 "Client Secret" 복사

  연동 코드:
  <script src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js"></script>
  const naverLogin = new naver.LoginWithNaverId({
    clientId: 'YOUR_CLIENT_ID',
    callbackUrl: 'YOUR_CALLBACK_URL',
    loginButton: { color: 'green', type: 3, height: 60 }
  });
  naverLogin.init();

  ── 구글 로그인 ──────────────────────────────────────────────
  1. https://console.cloud.google.com 접속
  2. 새 프로젝트 생성 (예: Banvier)
  3. API 및 서비스 > OAuth 동의 화면 설정
  4. API 및 서비스 > 사용자 인증 정보 > OAuth 2.0 클라이언트 ID 생성
     → 애플리케이션 유형: 웹 애플리케이션
     → 승인된 리디렉션 URI 추가
  5. "클라이언트 ID" 복사

  연동 코드:
  <script src="https://accounts.google.com/gsi/client" async></script>
  <div id="g_id_onload"
    data-client_id="YOUR_CLIENT_ID"
    data-callback="handleGoogleLogin">
  </div>
  function handleGoogleLogin(response) {
    // response.credential = JWT 토큰
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    console.log(payload.name, payload.email);
  }
  ══════════════════════════════════════════════════════════════
-->

<style>
:root {
  --ink:        #18160f;
  --ink-soft:   #3a3728;
  --gold:       #b8923a;
  --gold-lt:    #d4af6a;
  --gold-pale:  #f5ead8;
  --cream:      #faf7f2;
  --warm-gray:  #e6e0d4;
  --mid-gray:   #9e9484;
  --white:      #ffffff;
  --success:    #2d7a4f;
  --naver-green:#03c75a;
  --kakao-yellow:#fee500;
  --google-blue: #4285f4;

  --ff-serif:  'Cormorant Garamond', Georgia, serif;
  --ff-sans:   'Noto Sans KR', 'DM Sans', sans-serif;
  --ease:      cubic-bezier(.16,1,.3,1);
  --sh-sm:     0 2px 10px rgba(24,22,15,.07);
  --sh-md:     0 6px 28px rgba(24,22,15,.12);
  --sh-lg:     0 18px 60px rgba(24,22,15,.18);
  --r:         14px;
  --hh:        62px;
  --sh:        58px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--ff-sans);background:var(--cream);color:var(--ink);
  height:100dvh;overflow:hidden;display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{height:var(--hh);background:var(--ink);display:flex;align-items:center;
  justify-content:space-between;padding:0 26px;flex-shrink:0;z-index:200;position:relative}

.logo{display:flex;align-items:center;gap:11px;text-decoration:none}
.logo-wm{font-family:var(--ff-serif);font-size:27px;font-weight:600;color:#fff;letter-spacing:.5px;line-height:1}
.logo-wm em{font-style:italic;color:var(--gold-lt)}
.logo-div{width:1px;height:22px;background:rgba(255,255,255,.22);flex-shrink:0}
.logo-tag{font-size:12px;letter-spacing:.5px;color:var(--gold-lt);font-weight:500;
  font-family:var(--ff-sans);line-height:1.3;max-width:140px}

.hdr-r{display:flex;align-items:center;gap:8px}
.lang-tog{display:flex;background:rgba(255,255,255,.1);border-radius:6px;
  overflow:hidden;border:1px solid rgba(255,255,255,.15)}
.lang-b{background:transparent;border:none;color:rgba(255,255,255,.55);
  font-size:11.5px;font-weight:600;font-family:var(--ff-sans);
  padding:6px 11px;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.lang-b.on{background:var(--gold);color:var(--ink);font-weight:700}

.hdr-btn{background:transparent;border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.82);font-family:var(--ff-sans);font-size:12px;
  padding:7px 14px;border-radius:7px;cursor:pointer;transition:all .2s}
.hdr-btn:hover{border-color:var(--gold-lt);color:var(--gold-lt)}
.hdr-btn.cta{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:700}
.hdr-btn.cta:hover{background:var(--gold-lt)}

/* Login button */
.login-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.85);
  font-family:var(--ff-sans);font-size:12px;padding:7px 14px;
  border-radius:7px;cursor:pointer;transition:all .2s}
.login-btn:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4)}
.login-avatar{width:24px;height:24px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:11px;
  color:var(--ink);font-weight:700}

.burger{display:none;background:transparent;border:1px solid rgba(255,255,255,.22);
  border-radius:7px;width:38px;height:38px;align-items:center;justify-content:center;
  cursor:pointer;flex-direction:column;gap:5px;padding:9px}
.burger span{display:block;height:1.5px;background:rgba(255,255,255,.82);border-radius:2px;transition:all .25s}

/* ── SEARCH STRIP ── */
.strip{height:var(--sh);background:#fff;border-bottom:1px solid var(--warm-gray);
  display:flex;align-items:center;gap:7px;padding:0 18px;
  flex-shrink:0;box-shadow:var(--sh-sm);overflow-x:auto;scrollbar-width:none}
.strip::-webkit-scrollbar{display:none}

.s-box{display:flex;align-items:center;gap:7px;background:var(--cream);
  border:1.5px solid var(--warm-gray);border-radius:9px;padding:0 12px;
  min-width:220px;flex:1;max-width:300px;transition:border-color .2s}
.s-box:focus-within{border-color:var(--gold);background:#fff}
.s-box svg{color:var(--mid-gray);flex-shrink:0}
.s-box input{background:transparent;border:none;outline:none;font-family:var(--ff-sans);
  font-size:13px;color:var(--ink);padding:10px 0;width:100%}
.s-box input::placeholder{color:var(--mid-gray)}

.s-sep{width:1px;height:26px;background:var(--warm-gray);flex-shrink:0}

.s-pill{display:flex;align-items:center;gap:5px;white-space:nowrap;
  background:var(--cream);border:1.5px solid var(--warm-gray);border-radius:8px;
  padding:7px 11px;font-size:12px;font-family:var(--ff-sans);
  color:var(--ink-soft);cursor:pointer;transition:all .2s;flex-shrink:0}
.s-pill:hover{border-color:var(--gold);background:#fff}
.s-pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.s-pill select{background:transparent;border:none;outline:none;
  font-family:var(--ff-sans);font-size:12px;color:inherit;cursor:pointer;max-width:90px}

/* Star rating pills */
.star-pills{display:flex;gap:5px;flex-shrink:0}
.star-pill{background:var(--cream);border:1.5px solid var(--warm-gray);
  border-radius:8px;padding:7px 11px;font-size:12px;font-family:var(--ff-sans);
  color:var(--ink-soft);cursor:pointer;transition:all .2s;white-space:nowrap}
.star-pill:hover{border-color:var(--gold);background:#fff}
.star-pill.on{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700}

.s-go{background:var(--ink);color:#fff;border:none;border-radius:9px;
  padding:9px 18px;font-size:12.5px;font-weight:700;font-family:var(--ff-sans);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .2s}
.s-go:hover{background:var(--gold)}

/* ── CARD LOGO ── */
.c-logo{width:76px;height:76px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;position:relative}
.c-logo img{width:100%;height:100%;object-fit:contain;padding:8px}
.c-logo-svg{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.workspace{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── PANEL ── */
.panel{width:385px;flex-shrink:0;background:#fff;display:flex;
  flex-direction:column;border-right:1px solid var(--warm-gray);overflow:hidden}
.panel-bar{padding:12px 16px 9px;border-bottom:1px solid #f0ebe0;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cnt-text{font-size:12px;color:var(--mid-gray)}
.cnt-text strong{color:var(--ink);font-weight:700}
.sort-sel{background:transparent;border:1px solid var(--warm-gray);border-radius:6px;
  padding:5px 9px;font-size:11px;font-family:var(--ff-sans);color:var(--ink-soft);cursor:pointer}

.cards{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.cards::-webkit-scrollbar{width:3px}
.cards::-webkit-scrollbar-thumb{background:var(--warm-gray);border-radius:3px}

/* ── CARD ── */
.card{border:1.5px solid #eae4d8;border-radius:var(--r);padding:14px;cursor:pointer;
  display:flex;gap:12px;position:relative;overflow:hidden;transition:all .22s var(--ease);background:#fff}
.card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--gold);opacity:0;transition:opacity .2s}
.card:hover{border-color:var(--gold);box-shadow:var(--sh-md);transform:translateY(-1px)}
.card:hover::after,.card.sel::after{opacity:1}
.card.sel{border-color:var(--ink);background:#faf8f2;box-shadow:var(--sh-md)}

.c-thumb{width:76px;height:76px;border-radius:10px;
  background:linear-gradient(135deg,var(--ink) 0%,#2d2820 100%);
  display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
.c-name{font-family:var(--ff-serif);font-size:14.5px;font-weight:600;color:var(--ink);
  line-height:1.25;flex:1;overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical}
.c-stars{color:var(--gold);font-size:10px;flex-shrink:0;margin-left:5px;letter-spacing:.5px}
.c-addr{font-size:11px;color:var(--mid-gray);margin-bottom:6px;display:flex;align-items:center;gap:3px}
.c-chips{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.ch{background:var(--cream);color:var(--ink-soft);font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.ch.g{background:var(--gold-pale);color:var(--gold)}
.c-ft{display:flex;justify-content:space-between;align-items:center}
.c-cap{font-size:11px;color:var(--mid-gray)}
.c-price{font-size:12.5px;font-weight:700;color:var(--ink)}
.c-price small{font-size:10px;font-weight:400;color:var(--mid-gray)}

/* Star badge on card */
.star-badge{position:absolute;top:10px;right:10px;
  background:var(--gold);color:var(--ink);font-size:9px;font-weight:700;
  padding:2px 6px;border-radius:4px;letter-spacing:.3px}

/* ── MAP ── */
.map-wrap{flex:1;position:relative;overflow:hidden;background:#e8e8e8}

/* Naver Map container */
#naverMap{width:100%;height:100%}

/* Static map canvas (fallback — 네이버 지도 로드 전 표시) */
.map-cv{width:100%;height:100%;position:relative;display:none}
.map-cv::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.3) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.3) 1px,transparent 1px);
  background-size:42px 42px}
.river{position:absolute;background:rgba(150,185,215,.5);border-radius:30px}
.road{position:absolute;background:rgba(255,255,255,.7);border-radius:4px}
.d-lbl{position:absolute;font-family:var(--ff-serif);font-style:italic;font-size:12.5px;
  color:rgba(70,65,50,.4);letter-spacing:.5px;pointer-events:none;user-select:none}

/* Pins */
.pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;
  z-index:10;transition:transform .2s var(--ease)}
.pin:hover{transform:translate(-50%,-100%) scale(1.18);z-index:20}
.pin.on{transform:translate(-50%,-100%) scale(1.22);z-index:30}
.pin-lbl{background:var(--ink);color:#fff;padding:4px 9px;border-radius:10px;
  font-size:10.5px;font-weight:700;white-space:normal;text-align:center;
  max-width:88px;line-height:1.35;
  box-shadow:0 3px 12px rgba(24,22,15,.32);position:relative;
  transition:background .2s,color .2s;font-family:var(--ff-sans)}
.pin-lbl::after{content:'';position:absolute;bottom:-5px;left:50%;
  transform:translateX(-50%);border:4px solid transparent;
  border-top-color:var(--ink);border-bottom:0;transition:border-top-color .2s}
.pin:hover .pin-lbl,.pin.on .pin-lbl{background:var(--gold);color:var(--ink)}
.pin:hover .pin-lbl::after,.pin.on .pin-lbl::after{border-top-color:var(--gold)}

/* Popup */
.popup{position:absolute;background:#fff;border-radius:13px;padding:15px 15px 13px;
  width:248px;box-shadow:var(--sh-lg);z-index:50;
  border:1px solid var(--warm-gray);animation:popIn .2s var(--ease)}
@keyframes popIn{from{opacity:0;transform:translateY(8px) scale(.95)}to{opacity:1;transform:none}}
.pop-x{position:absolute;top:9px;right:11px;background:none;border:none;
  font-size:16px;cursor:pointer;color:var(--mid-gray);line-height:1;transition:color .15s}
.pop-x:hover{color:var(--ink)}
.pop-name{font-family:var(--ff-serif);font-size:15px;font-weight:600;
  color:var(--ink);margin-bottom:2px;padding-right:18px;line-height:1.25}
.pop-stars{color:var(--gold);font-size:10px;margin-bottom:7px}
.pop-row{font-size:11px;color:var(--ink-soft);margin-bottom:3px;
  display:flex;align-items:flex-start;gap:5px}
.pop-chips{display:flex;gap:3px;flex-wrap:wrap;margin:7px 0}
.pop-cta{width:100%;background:var(--ink);color:#fff;border:none;border-radius:8px;
  padding:9px;font-size:12px;font-weight:700;font-family:var(--ff-sans);
  cursor:pointer;margin-top:5px;transition:background .2s}
.pop-cta:hover{background:var(--gold);color:var(--ink)}

/* Map controls */
.map-ctrls{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:5px;z-index:40}
.mc{width:34px;height:34px;background:#fff;border:none;border-radius:8px;
  box-shadow:var(--sh-sm);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:box-shadow .2s;color:var(--ink)}
.mc:hover{box-shadow:var(--sh-md)}

.map-lgd{position:absolute;bottom:14px;left:14px;background:rgba(255,255,255,.92);
  backdrop-filter:blur(6px);border-radius:10px;padding:9px 13px;
  box-shadow:var(--sh-sm);font-size:11px;color:var(--mid-gray);z-index:40;
  border:1px solid rgba(255,255,255,.5)}
.lg-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.lg-row:last-child{margin-bottom:0}
.lg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* Map API notice */
.map-notice{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  background:rgba(24,22,15,.78);color:rgba(255,255,255,.85);
  font-size:11px;padding:7px 14px;border-radius:20px;z-index:40;
  white-space:nowrap;backdrop-filter:blur(4px);pointer-events:none}

/* ── MODAL OVERLAY ── */
.ovl{position:fixed;inset:0;background:rgba(24,22,15,.52);z-index:500;
  display:none;align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(3px)}
.ovl.open{display:flex}

/* ── DETAIL SHEET ── */
.d-sheet{background:#fff;border-radius:20px;width:100%;max-width:700px;
  max-height:90dvh;overflow-y:auto;box-shadow:var(--sh-lg);
  animation:shUp .3s var(--ease)}
@keyframes shUp{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}
.d-sheet::-webkit-scrollbar{width:3px}
.d-sheet::-webkit-scrollbar-thumb{background:var(--warm-gray);border-radius:3px}

.d-hd{background:linear-gradient(140deg,var(--ink) 0%,#2c2819 100%);
  padding:28px 26px 24px;border-radius:20px 20px 0 0;position:relative;color:#fff}
.d-deco{position:absolute;top:-18px;right:-18px;width:150px;height:150px;
  background:radial-gradient(circle,rgba(184,146,58,.2) 0%,transparent 70%);
  border-radius:50%}
.d-cls{position:absolute;top:13px;right:14px;background:rgba(255,255,255,.12);
  border:none;color:#fff;width:29px;height:29px;border-radius:50%;font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.d-cls:hover{background:rgba(255,255,255,.22)}
.d-ej{font-size:42px;margin-bottom:10px}
.d-nm{font-family:var(--ff-serif);font-size:24px;font-weight:700;margin-bottom:3px;line-height:1.2}
.d-st{color:var(--gold-lt);font-size:13px;margin-bottom:6px}
.d-loc{font-size:12px;color:rgba(255,255,255,.62);display:flex;align-items:center;gap:6px}
.d-loc span{color:rgba(255,255,255,.3)}

.d-body{padding:22px 26px 26px}
.d-sec{font-family:var(--ff-serif);font-size:16px;font-weight:600;
  color:var(--ink);margin-bottom:11px;padding-bottom:6px;
  border-bottom:1.5px solid var(--gold);display:inline-block}
.d-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:22px}
.d-stat{background:var(--cream);border-radius:12px;padding:13px 9px;text-align:center}
.d-si{font-size:20px;margin-bottom:3px}
.d-sl{font-size:10px;color:var(--mid-gray);margin-bottom:2px}
.d-sv{font-size:12.5px;font-weight:700;color:var(--ink)}

.v-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:22px}
.v-it{background:var(--cream);border:1.5px solid transparent;border-radius:11px;
  padding:13px;cursor:pointer;transition:all .2s}
.v-it:hover{border-color:var(--gold);background:#fff;box-shadow:var(--sh-sm)}
.v-nm{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:2px}
.v-cp{font-size:11px;color:var(--mid-gray);margin-bottom:4px}
.v-pr{font-size:12.5px;font-weight:700;color:var(--gold)}

.am-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:22px}
.am-tag{background:var(--gold-pale);color:var(--gold);font-size:11px;
  font-weight:500;padding:4px 11px;border-radius:18px}

/* Contact section */
.contact-box{background:var(--cream);border-radius:13px;padding:18px;margin-bottom:20px;
  border:1.5px solid var(--warm-gray)}
.contact-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.contact-row:last-child{margin-bottom:0}
.contact-icon{width:36px;height:36px;border-radius:9px;background:#fff;
  border:1px solid var(--warm-gray);display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;box-shadow:var(--sh-sm)}
.contact-info{flex:1;min-width:0}
.contact-label{font-size:10.5px;color:var(--mid-gray);margin-bottom:2px}
.contact-val{font-size:13px;font-weight:600;color:var(--ink)}
.contact-btn{background:var(--ink);color:#fff;border:none;border-radius:7px;
  padding:8px 14px;font-size:11.5px;font-weight:700;font-family:var(--ff-sans);
  cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.contact-btn:hover{background:var(--gold);color:var(--ink)}
.contact-btn.email{background:var(--gold-pale);color:var(--gold);border:1px solid var(--gold)}
.contact-btn.email:hover{background:var(--gold);color:var(--ink)}

.d-acts{display:flex;gap:8px;padding-top:2px}
.d-act{flex:1;padding:13px;border-radius:11px;font-size:13px;font-weight:700;
  font-family:var(--ff-sans);cursor:pointer;border:none;transition:all .2s}
.d-act.p{background:var(--ink);color:#fff}
.d-act.p:hover{background:#2d2820}
.d-act.s{background:var(--gold);color:var(--ink)}
.d-act.s:hover{background:var(--gold-lt)}
.d-act.o{background:#fff;color:var(--ink);border:1.5px solid var(--ink);flex:0 0 auto;padding:13px 16px}
.d-act.o:hover{background:var(--cream)}

/* ── LOGIN MODAL ── */
.login-modal{background:#fff;border-radius:20px;width:100%;max-width:400px;
  padding:32px 28px;box-shadow:var(--sh-lg);animation:shUp .3s var(--ease);
  position:relative}
.lm-logo{font-family:var(--ff-serif);font-size:28px;font-weight:600;
  color:var(--ink);text-align:center;margin-bottom:4px}
.lm-logo em{font-style:italic;color:var(--gold)}
.lm-sub{font-size:12.5px;color:var(--mid-gray);text-align:center;margin-bottom:28px}
.lm-cls{position:absolute;top:14px;right:16px;background:none;border:none;
  font-size:18px;cursor:pointer;color:var(--mid-gray);line-height:1}
.lm-cls:hover{color:var(--ink)}

.social-btn{width:100%;display:flex;align-items:center;gap:12px;
  border-radius:11px;padding:13px 18px;font-size:14px;font-weight:600;
  font-family:var(--ff-sans);cursor:pointer;border:none;transition:all .2s;
  margin-bottom:10px}
.social-btn:last-of-type{margin-bottom:0}
.social-icon{width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

.btn-kakao{background:var(--kakao-yellow);color:#3a1d1d}
.btn-kakao:hover{background:#ffd900;transform:translateY(-1px);box-shadow:var(--sh-sm)}
.btn-kakao .social-icon{background:rgba(0,0,0,.05)}

.btn-naver{background:var(--naver-green);color:#fff}
.btn-naver:hover{background:#02b350;transform:translateY(-1px);box-shadow:var(--sh-sm)}
.btn-naver .social-icon{background:rgba(0,0,0,.1)}

.btn-google{background:#fff;color:#3a3a3a;border:1.5px solid #e0e0e0}
.btn-google:hover{background:#f8f8f8;transform:translateY(-1px);box-shadow:var(--sh-sm)}
.btn-google .social-icon{background:none}

.lm-divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--mid-gray);font-size:12px}
.lm-divider::before,.lm-divider::after{content:'';flex:1;height:1px;background:var(--warm-gray)}

.lm-notice{font-size:10.5px;color:var(--mid-gray);text-align:center;
  line-height:1.6;margin-top:18px}
.lm-notice a{color:var(--gold);text-decoration:none}

/* ── QUOTE MODAL ── */
.quote-modal{background:#fff;border-radius:20px;width:100%;max-width:520px;
  max-height:88dvh;overflow-y:auto;padding:28px 26px;
  box-shadow:var(--sh-lg);animation:shUp .3s var(--ease);position:relative}
.quote-modal::-webkit-scrollbar{width:3px}
.quote-modal::-webkit-scrollbar-thumb{background:var(--warm-gray);border-radius:3px}
.qm-ttl{font-family:var(--ff-serif);font-size:22px;font-weight:600;
  color:var(--ink);margin-bottom:4px}
.qm-sub{font-size:12.5px;color:var(--mid-gray);margin-bottom:22px}
.qm-cls{position:absolute;top:14px;right:16px;background:none;border:none;
  font-size:18px;cursor:pointer;color:var(--mid-gray)}
.qm-cls:hover{color:var(--ink)}

.form-row{margin-bottom:14px}
.form-label{font-size:11.5px;font-weight:600;color:var(--ink-soft);
  margin-bottom:5px;display:block}
.form-input,.form-sel,.form-ta{width:100%;background:var(--cream);
  border:1.5px solid var(--warm-gray);border-radius:9px;
  padding:10px 13px;font-size:13px;font-family:var(--ff-sans);
  color:var(--ink);outline:none;transition:border-color .2s}
.form-input:focus,.form-sel:focus,.form-ta:focus{border-color:var(--gold);background:#fff}
.form-ta{resize:vertical;min-height:80px}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.form-hint{font-size:10.5px;color:var(--mid-gray);margin-top:4px}

.hotel-target{background:var(--cream);border-radius:10px;padding:12px;
  margin-bottom:16px;border:1px solid var(--warm-gray)}
.ht-name{font-family:var(--ff-serif);font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px}
.ht-contact{font-size:12px;color:var(--mid-gray);display:flex;align-items:center;gap:5px}

.qm-send{width:100%;background:var(--ink);color:#fff;border:none;
  border-radius:11px;padding:14px;font-size:14px;font-weight:700;
  font-family:var(--ff-sans);cursor:pointer;transition:all .2s;margin-top:6px}
.qm-send:hover{background:var(--gold);color:var(--ink)}
.qm-note{font-size:10.5px;color:var(--mid-gray);text-align:center;margin-top:10px;line-height:1.6}

/* ── MOBILE ── */
.mob-tabs{display:none;background:#fff;border-bottom:1px solid var(--warm-gray);flex-shrink:0}
.mob-tab-row{display:flex}
.m-tab{flex:1;padding:11px;border:none;background:transparent;
  font-family:var(--ff-sans);font-size:12.5px;font-weight:500;
  color:var(--mid-gray);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.m-tab.on{color:var(--ink);border-bottom-color:var(--gold);font-weight:700}

.mob-menu{display:none;position:fixed;inset:0;z-index:600}
.mob-menu.open{display:block}
.mob-bd{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.mob-dr{position:absolute;top:0;right:0;width:260px;height:100%;
  background:var(--ink);padding:22px 18px;display:flex;
  flex-direction:column;gap:10px;animation:drIn .25s var(--ease)}
@keyframes drIn{from{transform:translateX(100%)}to{transform:none}}
.mob-cls{align-self:flex-end;background:rgba(255,255,255,.1);border:none;
  color:#fff;width:30px;height:30px;border-radius:50%;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.mob-item{color:rgba(255,255,255,.72);font-size:13.5px;font-family:var(--ff-sans);
  background:none;border:none;cursor:pointer;text-align:left;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);transition:color .2s}
.mob-item:hover{color:var(--gold-lt)}

/* ── I18N ── */
[data-lang="ko"] .en{display:none!important}
[data-lang="en"] .ko{display:none!important}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  :root{--hh:54px;--sh:52px}
  .hdr{padding:0 14px}
  .logo-div,.logo-tag,.hdr-btn:not(.mob-ok){display:none}
  .logo-wm{font-size:21px}
  .burger{display:flex}
  .strip{padding:0 10px;gap:5px}
  .s-box{min-width:140px}
  .s-sep,.star-pills .star-pill:nth-child(n+3){display:none}
  .mob-tabs{display:block}
  .workspace{position:relative}
  .panel{position:absolute;inset:0;width:100%;z-index:5;transition:opacity .25s,transform .25s}
  .panel.hide{opacity:0;pointer-events:none;transform:translateX(-8px)}
  .map-wrap{position:absolute;inset:0;z-index:4;transition:opacity .25s}
  .map-wrap.hide{opacity:0;pointer-events:none}
}
@media(max-width:480px){
  .d-stats{gap:6px}
  .v-grid{grid-template-columns:1fr}
  .d-acts{flex-wrap:wrap}
  .d-act.o{flex:1 1 100%}
  .d-body{padding:16px 16px 22px}
  .d-hd{padding:20px 16px 18px}
  .d-nm{font-size:20px}
  .ovl{padding:0;align-items:flex-end}
  .d-sheet{border-radius:20px 20px 0 0;max-height:92dvh}
  .login-modal,.quote-modal{border-radius:20px 20px 0 0;max-height:92dvh}
  .form-row2{grid-template-columns:1fr}
  .contact-row{flex-wrap:wrap}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fu{animation:fadeUp .38s var(--ease) both}
</style>
</head>
<body>

<!-- ━━ HEADER ━━ -->
<header class="hdr">
  <a href="#" class="logo">
    <span class="logo-wm">Ban<em>vier</em></span>
    <span class="logo-div"></span>
    <span class="logo-tag ko">연회장 비교 · 예약 플랫폼</span>
    <span class="logo-tag en">Venue Research & Booking</span>
  </a>
  <div class="hdr-r">
    <div class="lang-tog">
      <button class="lang-b on" onclick="setLang('ko')">KO</button>
      <button class="lang-b" onclick="setLang('en')">EN</button>
    </div>
    <button class="hdr-btn ko" onclick="openQuote(null)">호텔 등록 문의</button>
    <button class="hdr-btn en" onclick="openQuote(null)">List Your Venue</button>
    <button class="login-btn" id="loginBtn" onclick="openLogin()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="ko">로그인</span><span class="en">Login</span>
    </button>
    <button class="burger" onclick="openMobMenu()" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- ━━ MOBILE MENU ━━ -->
<div class="mob-menu" id="mobMenu">
  <div class="mob-bd" onclick="closeMobMenu()"></div>
  <div class="mob-dr">
    <button class="mob-cls" onclick="closeMobMenu()">✕</button>
    <button class="mob-item ko" onclick="closeMobMenu();openLogin()">🔐 로그인 / 회원가입</button>
    <button class="mob-item en" onclick="closeMobMenu();openLogin()">🔐 Login / Sign Up</button>
    <button class="mob-item ko" onclick="closeMobMenu();openQuote(null)">🏨 호텔 등록 문의</button>
    <button class="mob-item en" onclick="closeMobMenu();openQuote(null)">🏨 List Your Venue</button>
    <button class="mob-item ko" onclick="closeMobMenu()">❓ 서비스 소개</button>
    <button class="mob-item en" onclick="closeMobMenu()">❓ About Banvier</button>
    <div style="margin-top:auto">
      <div class="lang-tog" style="width:fit-content">
        <button class="lang-b on" onclick="setLang('ko')">KO</button>
        <button class="lang-b" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </div>
</div>

<!-- ━━ SEARCH STRIP ━━ -->
<div class="strip">
  <div class="s-box fu">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="q" class="ko" placeholder="호텔명, 지역, 역명 검색…" oninput="run()">
    <input type="text" id="qen" class="en" placeholder="Hotel, district, station…" oninput="run()" style="display:none">
  </div>

  <div class="s-sep"></div>

  <div class="s-pill fu">
    <select id="rgn" onchange="run()">
      <option value="">전체</option>
      <option value="강남">강남</option>
      <option value="중구">중구·명동</option>
      <option value="종로">종로·광화문</option>
      <option value="용산">용산·이태원</option>
      <option value="여의도">여의도</option>
      <option value="마포">마포·홍대</option>
      <option value="동대문">동대문</option>
      <option value="잠실">잠실·송파</option>
    </select>
  </div>

  <div class="s-pill fu">
    <span>👥</span>
    <select id="cap" onchange="run()">
      <option value="">인원</option>
      <option value="50">~50명</option>
      <option value="100">~100명</option>
      <option value="300">~300명</option>
      <option value="500">500+</option>
    </select>
  </div>

  <!-- ★ 성급 필터 -->
  <div class="star-pills fu" id="starPills">
    <button class="star-pill" data-star="5" onclick="toggleStar(5)">★★★★★</button>
    <button class="star-pill" data-star="4" onclick="toggleStar(4)">★★★★</button>
    <button class="star-pill" data-star="3" onclick="toggleStar(3)">★★★</button>
  </div>

  <div class="s-sep"></div>

  <div class="s-pill fu">
    <select id="evtType" onchange="run()">
      <option value="" class="ko">행사 유형</option>
      <option value="" class="en">Event Type</option>
      <option value="기업행사" class="ko">기업행사</option>
      <option value="기업행사" class="en">Corporate</option>
      <option value="웨딩·돌잔치" class="ko">웨딩·돌잔치</option>
      <option value="웨딩·돌잔치" class="en">Wedding</option>
      <option value="만찬·연회" class="ko">만찬·연회</option>
      <option value="만찬·연회" class="en">Gala Dinner</option>
      <option value="세미나" class="ko">세미나·컨퍼런스</option>
      <option value="세미나" class="en">Seminar</option>
    </select>
  </div>

  <button class="s-go fu" onclick="run()">
    <span class="ko">검색</span><span class="en">Search</span>
  </button>
</div>

<!-- ━━ MOBILE TABS ━━ -->
<div class="mob-tabs">
  <div class="mob-tab-row">
    <button class="m-tab on" id="tList" onclick="switchTab('list')">
      ☰ <span class="ko">목록</span><span class="en">List</span>
    </button>
    <button class="m-tab" id="tMap" onclick="switchTab('map')">
      🗺 <span class="ko">지도</span><span class="en">Map</span>
    </button>
  </div>
</div>

<!-- ━━ WORKSPACE ━━ -->
<div class="workspace">

  <!-- PANEL -->
  <div class="panel" id="panel">
    <div class="panel-bar">
      <span class="cnt-text"><strong id="cnt">12</strong><span class="ko">개 연회장</span><span class="en"> venues</span></span>
      <select class="sort-sel" id="sortSel" onchange="run()">
        <option value="rec" class="ko">추천순</option>
        <option value="rec" class="en">Recommended</option>
        <option value="price">가격 낮은순</option>
        <option value="cap">수용인원순</option>
        <option value="star">성급 높은순</option>
      </select>
    </div>
    <div class="cards" id="cards"></div>
  </div>

  <!-- MAP -->
  <div class="map-wrap" id="mapWrap">
    <!-- 네이버 지도 실제 렌더링 컨테이너 -->
    <div id="naverMap"></div>

    <!-- fallback (지도 로드 실패 시) -->
    <div class="map-cv" id="mapCv">
      <div class="river" style="left:0;right:0;top:70%;height:20px;transform:rotate(-1.5deg)"></div>
      <div class="river" style="left:0;right:22%;top:68%;height:13px;opacity:.55;transform:rotate(-.5deg)"></div>
      <div class="road" style="top:35%;left:0;right:0;height:9px;opacity:.6"></div>
      <div class="road" style="top:51%;left:0;right:0;height:6px;opacity:.5"></div>
      <div class="road" style="left:27%;top:0;bottom:0;width:8px;opacity:.52"></div>
      <div class="road" style="left:51%;top:0;bottom:0;width:6px;opacity:.43"></div>
      <div class="d-lbl" style="left:7%;top:22%">마포</div>
      <div class="d-lbl" style="left:25%;top:11%">종로</div>
      <div class="d-lbl" style="left:55%;top:43%">강남</div>
      <div class="d-lbl" style="left:5%;top:54%">여의도</div>
      <div class="d-lbl" style="left:71%;top:57%">잠실</div>
      <div class="d-lbl" style="left:41%;top:29%">용산</div>
      <div id="pins"></div>
    </div>

    <div class="map-ctrls">
      <button class="mc" onclick="zoomIn()">＋</button>
      <button class="mc" onclick="zoomOut()">－</button>
      <button class="mc" onclick="resetCenter()" title="서울 중심으로">⊙</button>
    </div>
    <div class="map-lgd">
      <div class="lg-row"><div class="lg-dot" style="background:var(--ink)"></div><span class="ko">연회장</span><span class="en">Venue</span></div>
      <div class="lg-row"><div class="lg-dot" style="background:var(--gold)"></div><span class="ko">선택됨</span><span class="en">Selected</span></div>
    </div>
  </div>

function setLang(l){
  lang=l;
  document.documentElement.setAttribute('data-lang',l);
  document.querySelectorAll('.lang-b').forEach(b=>b.classList.toggle('on',b.textContent.trim().toLowerCase()===l));
  document.querySelectorAll('[data-lang-placeholder]').forEach(el=>{
    el.placeholder=el.dataset['placeholder'+l.charAt(0).toUpperCase()+l.slice(1)]||el.placeholder;
  });
  run();
}

function toggleStar(s){
  const btn=document.querySelector(`.star-pill[data-star="${s}"]`);
  if(starFilter.has(s)){starFilter.delete(s);btn.classList.remove('on');}
  else{starFilter.add(s);btn.classList.add('on');}
  run();
}


/* ══════════════════════════════════════
   FILTER + SORT
══════════════════════════════════════ */
function run(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const rgn=document.getElementById('rgn').value;
  const cap=parseInt(document.getElementById('cap').value)||0;
  const evtType=document.getElementById('evtType').value;
  const sortVal=document.getElementById('sortSel').value;

  let list=H.filter(h=>{
    const tgt=(h.name+h.nameEn+h.addr+h.addrEn+h.rgn).toLowerCase();
    if(q&&!tgt.includes(q))return false;
    if(rgn&&!h.rgn.includes(rgn)&&!h.addr.includes(rgn))return false;
    if(cap&&h.maxCap<cap)return false;
    if(starFilter.size&&!starFilter.has(h.star))return false;
    if(evtType&&!h.types.includes(evtType))return false;
    return true;
  });

  if(sortVal==='price') list=[...list].sort((a,b)=>a.minKRW-b.minKRW);
  else if(sortVal==='cap') list=[...list].sort((a,b)=>b.maxCap-a.maxCap);
  else if(sortVal==='star') list=[...list].sort((a,b)=>b.star-a.star);

  document.getElementById('cnt').textContent=list.length;
  renderCards(list);
  renderPins(list);
}

function makePinSvg(lbl, active){
  const bg  = active ? '#b8923a' : '#18160f';
  const txt = active ? '#18160f' : '#ffffff';
  const lines = lbl.split('\n');
  const lineH = 14, pad = 8, lineW = 76;
  const h = lines.length * lineH + pad * 2;
  const rows = lines.map((l,i)=>
    `<text x="${lineW/2}" y="${pad+12+i*lineH}" text-anchor="middle"
     font-family="Noto Sans KR,sans-serif" font-size="11" font-weight="700"
     fill="${txt}">${l}</text>`).join('');
  return `data:image/svg+xml;charset=UTF-8,`+encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="${lineW}" height="${h+8}">
      <rect x="0" y="0" width="${lineW}" height="${h}" rx="8" fill="${bg}"/>
      ${rows}
      <polygon points="${lineW/2-6},${h} ${lineW/2+6},${h} ${lineW/2},${h+7}" fill="${bg}"/>
    </svg>`
  );
}

function buildMarkers(list){
  // 기존 마커 전부 제거
  Object.values(naverMarkers).forEach(m=>m.setMap(null));
  naverMarkers = {};

  // InfoWindow 닫기
  if(naverInfoWin){ naverInfoWin.close(); naverInfoWin=null; }

  list.forEach(h=>{
    const coords = COORDS[h.id];
    if(!coords) return;
    const lbl = PIN_LABELS[h.id]?.[lang==='ko'?'ko':'en'] || h.name;
    const isActive = h.id === selHotel;

    const marker = new naver.maps.Marker({
      position: new naver.maps.LatLng(coords[0], coords[1]),
      map: naverMap,
      title: h.name,
      icon: {
        url: makePinSvg(lbl, isActive),
        size: new naver.maps.Size(76, 50),
        anchor: new naver.maps.Point(38, 50),
      },
      zIndex: isActive ? 20 : 10,
    });

    naver.maps.Event.addListener(marker, 'click', ()=>{
      selHotel = h.id;
      run();
      showNaverPopup(h.id);
      const c = document.getElementById('card-'+h.id);
      if(c) c.scrollIntoView({behavior:'smooth',block:'nearest'});
      if(window.innerWidth<=900) switchTab('map');
    });

    naverMarkers[h.id] = marker;
  });
}

      ${h?`<div class="hotel-target">
        <div class="ht-name">${h.e} ${ko?h.name:h.nameEn}</div>
        <div class="ht-contact">✉️ ${h.email}</div>
      </div>`:''}

      <div class="form-row">
        <label class="form-label">${ko?'담당자 성함':'Your Name'} *</label>
        <input class="form-input" placeholder="${ko?'홍길동':'Full Name'}" ${curUser?`value="${curUser.name}"`:''}/>
      </div>
      <div class="form-row2">
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">${ko?'연락처':'Phone'} *</label>
          <input class="form-input" placeholder="010-0000-0000"/>
        </div>
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">${ko?'이메일':'Email'} *</label>
          <input class="form-input" placeholder="${ko?'이메일 주소':'your@email.com'}" ${curUser?`value="${curUser.email||''}"`:''}/>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">${ko?'회사 / 단체명 (선택)':'Company / Organization'}</label>
        <input class="form-input" placeholder="${ko?'(주)반비에 코리아':'Banvier Korea Inc.'}"/>
      </div>
      <div class="form-row2">
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">${ko?'행사 유형':'Event Type'} *</label>
          <select class="form-sel">
            <option>${ko?'선택':'Select'}</option>
            <option>${ko?'기업 세미나':'Corporate Seminar'}</option>
            <option>${ko?'기업 만찬':'Corporate Dinner'}</option>
            <option>${ko?'컨퍼런스':'Conference'}</option>
            <option>${ko?'웨딩':'Wedding'}</option>
            <option>${ko?'돌잔치':'First Birthday'}</option>
            <option>${ko?'기타':'Other'}</option>
          </select>
        </div>
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">${ko?'예상 인원':'Expected Guests'} *</label>
          <input class="form-input" placeholder="${ko?'예: 100명':'e.g. 100'}"/>
        </div>
      </div>
      <div class="form-row2">
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">${ko?'희망 날짜':'Preferred Date'}</label>
          <input class="form-input" type="date"/>
        </div>
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">${ko?'예산 범위':'Budget Range'}</label>
          <select class="form-sel">
            <option>${ko?'선택':'Select'}</option>
            <option>${ko?'50만원 이하':'Under ₩500K'}</option>
            <option>${ko?'50~100만원':'₩500K–1M'}</option>
            <option>${ko?'100~300만원':'₩1M–3M'}</option>
            <option>${ko?'300만원 이상':'Over ₩3M'}</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">${ko?'추가 요청사항':'Additional Notes'}</label>
        <textarea class="form-ta" placeholder="${ko?'행사 특이사항, 케이터링 요구, 장비 필요 등…':'Special requirements, catering needs, AV equipment…'}"></textarea>
      </div>
      <button class="qm-send" onclick="submitQuote(${id||'null'})">
        ${ko?'견적 요청 보내기 →':'Send Quote Request →'}
      </button>
      <div class="qm-note ko">제출 시 해당 호텔 연회팀 이메일(${h?h.email:'banquet@hotel.com'})로 직접 전달됩니다.<br>영업일 기준 1~2일 내 연락드립니다.</div>
      <div class="qm-note en">Your request will be sent directly to the hotel's banquet team.<br>Expect a reply within 1–2 business days.</div>
    </div>
  `);
}

function submitQuote(id){
  const ko=lang==='ko';
  closeOvl();
  // In production: POST to your backend → forward to hotel email
  setTimeout(()=>alert(ko
    ?'✅ 견적 요청이 접수되었습니다!\n호텔 연회팀에서 1~2 영업일 내에 연락드립니다.'
    :'✅ Quote request submitted!\nThe banquet team will reply within 1–2 business days.'
  ),100);
}

/* ══════════════════════════════════════
   OVERLAY HELPERS
══════════════════════════════════════ */
function setOvlContent(html){
  document.getElementById('ovlContent').innerHTML=html;
  document.getElementById('ovl').classList.add('open');
}
function closeOvl(e){
  if(!e||e.target===document.getElementById('ovl')){
    document.getElementById('ovl').classList.remove('open');
  }
}

/* ══════════════════════════════════════
   MOBILE
══════════════════════════════════════ */
function switchTab(t){
  curTab=t;
  document.getElementById('tList').classList.toggle('on',t==='list');
  document.getElementById('tMap').classList.toggle('on',t==='map');
  document.getElementById('panel').classList.toggle('hide',t!=='list');
  document.getElementById('mapWrap').classList.toggle('hide',t!=='map');
}
function openMobMenu(){document.getElementById('mobMenu').classList.add('open')}
function closeMobMenu(){document.getElementById('mobMenu').classList.remove('open')}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', ()=>{
  // 카드 먼저 렌더 (지도와 무관하게 즉시 동작)
  run();

  // 네이버 지도 초기화 (API 로드 완료 후 실행)
  if(typeof naver !== 'undefined' && naver.maps){
    initNaverMap();
  } else {
    window.addEventListener('load', ()=>{
      if(typeof naver !== 'undefined' && naver.maps){
        initNaverMap();
      } else {
        // fallback: 네이버 지도 API 인증 실패 시 정적 지도 표시
        const nm = document.getElementById('naverMap');
        const mc = document.getElementById('mapCv');
        if(nm) nm.style.display='none';
        if(mc) mc.style.display='block';
      }
    });
  }
});
</script>
